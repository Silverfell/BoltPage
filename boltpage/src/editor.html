<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoltPage Editor</title>
    <link rel="stylesheet" href="editor.css">
    <script type="module" src="/editor.js" defer></script>
</head>
<body>
    <div class="editor-shell">
        <header class="editor-header">
            <div class="editor-header-main">
                <div class="header-lead">
                    <div class="brand-block">
                        <img src="/assets/boltpage_icon.png" alt="BoltPage" class="brand-icon">
                    </div>
                    <div class="document-identity">
                        <div class="document-title-row">
                            <h1 id="editor-document-title" class="document-title">No Document Loaded</h1>
                            <div class="document-badges">
                                <span id="editor-mode-badge" class="meta-badge badge-tone-accent">Editor</span>
                                <span id="editor-kind-badge" class="meta-badge">Text</span>
                                <span id="editor-autosave-badge" class="meta-badge">Autosave</span>
                                <span id="editor-sync-badge" class="meta-badge" hidden>Linked Preview</span>
                                <span id="editor-status-badge" class="meta-badge">Ready</span>
                            </div>
                        </div>
                        <p id="editor-document-subtitle" class="document-subtitle">
                            Plaintext editing with autosave and preview sync.
                        </p>
                    </div>
                </div>
                <div class="editor-header-actions">
                    <button id="wrap-btn" class="toolbar-btn" title="Toggle word wrap">Wrap</button>
                    <button id="find-btn" class="toolbar-btn" title="Find (Ctrl+F)">
                        <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="8.5" cy="8.5" r="5.5"/>
                            <path d="M13 13l4 4"/>
                        </svg>
                        Find
                    </button>
                    <button id="close-btn" class="toolbar-btn" title="Close editor">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 4L4 12M4 4l8 8"/>
                        </svg>
                        Close
                    </button>
                </div>
            </div>
        </header>

        <div class="editor-container">
            <textarea id="editor-textarea" class="editor-textarea" placeholder="Start typing..." spellcheck="false"></textarea>
        </div>
    </div>
</body>
</html>
