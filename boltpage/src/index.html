<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoltPage</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="/main.js" defer></script>
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <div class="header-main">
                <div class="header-lead">
                    <div class="brand-block">
                        <img src="/assets/boltpage_icon.png" alt="BoltPage" class="brand-icon">
                    </div>
                    <button id="open-btn" class="toolbar-btn button-prominent" title="Open file (Ctrl+O)">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 7V4a1 1 0 011-1h5l2 2h5a1 1 0 011 1v1M3 7v9a1 1 0 001 1h12a1 1 0 001-1V8a1 1 0 00-1-1h-6l-2-2H4a1 1 0 00-1 1v1z"/>
                        </svg>
                        Open
                    </button>
                    <button id="new-btn" class="toolbar-btn" title="New file (Ctrl+N)">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10 4v12M4 10h12"/>
                        </svg>
                        New
                    </button>
                    <button id="edit-btn" class="toolbar-btn" title="Edit (Ctrl+E)">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14.5 2.5a2.121 2.121 0 113 3L6 17H3v-3L14.5 2.5z"/>
                        </svg>
                        Edit
                    </button>
                    <button id="export-btn" class="toolbar-btn" title="Export HTML (Ctrl+Shift+E)">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M10 3v9"/>
                            <path d="M6.5 8.5L10 12l3.5-3.5"/>
                            <path d="M4 15.5h12"/>
                        </svg>
                        Export
                    </button>
                    <button id="find-btn" class="toolbar-btn" title="Find (Ctrl+F)">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="8.5" cy="8.5" r="5.5"/>
                            <path d="M13 13l4 4"/>
                        </svg>
                        Find
                    </button>
                    <button id="refresh-btn" class="toolbar-btn" title="Refresh">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 10a6 6 0 1011.18-3H12v3M16 10a6 6 0 10-11.18 3H8v-3"/>
                        </svg>
                        Refresh
                        <span class="refresh-indicator" id="refresh-indicator">!</span>
                    </button>
                </div>
                <div class="header-utility-actions">
                    <div class="theme-btn-wrapper">
                        <button id="theme-btn" class="toolbar-btn" title="View options (Ctrl+T)">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 5h12M4 10h12M4 15h12"/>
                            </svg>
                            View
                        </button>
                        <div id="theme-menu" class="theme-menu">
                            <div class="menu-section">
                                <span class="menu-section-label">Appearance</span>
                                <div class="menu-button-group">
                                    <button class="theme-option" data-theme="light">Light</button>
                                    <button class="theme-option" data-theme="dark">Dark</button>
                                    <button class="theme-option" data-theme="drac">Drac</button>
                                </div>
                                <div class="menu-setting-row">
                                    <span class="menu-setting-label">Type Size</span>
                                    <div class="font-size-controls" role="group" aria-label="Preview and editor text size">
                                        <button id="font-size-decrease-btn" class="font-size-button" type="button" title="Decrease text size">A-</button>
                                        <span id="font-size-indicator" class="font-size-indicator">18px</span>
                                        <button id="font-size-increase-btn" class="font-size-button" type="button" title="Increase text size">A+</button>
                                    </div>
                                </div>
                            </div>
                            <div class="menu-divider"></div>
                            <div class="menu-section">
                                <span class="menu-section-label">Workspace</span>
                                <button id="rail-toggle-option" class="menu-toggle-button" type="button">
                                    <span class="menu-toggle-copy">
                                        <span id="rail-toggle-title" class="menu-toggle-title">Context Rail</span>
                                        <span id="rail-toggle-caption" class="menu-toggle-caption">Keep document context visible beside the preview.</span>
                                    </span>
                                    <span id="rail-toggle-state" class="menu-toggle-state">On</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="main-area">
            <aside id="toc-sidebar" class="toc-sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-header-text">
                        <span class="sidebar-label">Contents</span>
                        <span class="sidebar-caption">Markdown outline</span>
                    </div>
                    <button id="toc-close-btn" class="toc-close-btn" title="Close sidebar" aria-label="Close sidebar">
                        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 4L4 12M4 4l8 8"/>
                        </svg>
                    </button>
                </div>
                <div id="sidebar-meta" class="sidebar-meta"></div>
                <nav id="toc-nav"></nav>
            </aside>
            <button id="toc-open-btn" class="toc-open-btn" hidden title="Open sidebar" aria-label="Open sidebar">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 4h14M3 8h10M3 12h12M3 16h8"/>
                </svg>
            </button>
            <div class="content-stage">
                <div class="content-wrapper">
                    <div id="markdown-content" class="markdown-body">
                        <div class="welcome-message">
                            <span class="welcome-eyebrow">BoltPage</span>
                            <h2>Open a document and keep the interface out of the way.</h2>
                            <p>Preview Markdown, structured text, and PDFs in a focused desktop workspace.</p>
                            <p>Use <kbd>Ctrl+O</kbd> to open a file or <kbd>Ctrl+N</kbd> to create one.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
